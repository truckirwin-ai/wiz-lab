apiVersion: v1
kind: Namespace
metadata:
  name: game-2048
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wizexercise
  namespace: game-2048
data:
  wizexercise.txt: |
    Robert Irwin
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
  namespace: game-2048
---
# INTENTIONAL MISCONFIGURATION: cluster-admin privileges on app service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-cluster-admin
subjects:
- kind: ServiceAccount
  name: app-service-account
  namespace: game-2048
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-2048
  namespace: game-2048
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: app-2048
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-2048
    spec:
      serviceAccountName: app-service-account
      containers:
      - name: app-2048
        image: public.ecr.aws/l6m2t8p7/docker-2048:latest
        # INTENTIONAL MISCONFIGURATION: plaintext MongoDB URI as environment variable
        env:
        - name: MONGO_URI
          value: "mongodb://admin:password123@mongo.game-2048.svc.cluster.local:27017/appdb"
        ports:
        - containerPort: 80
        volumeMounts:
        - name: wizexercise
          mountPath: /usr/share/nginx/html/wizexercise.txt
          subPath: wizexercise.txt
      volumes:
      - name: wizexercise
        configMap:
          name: wizexercise
---
apiVersion: v1
kind: Service
metadata:
  name: service-2048
  namespace: game-2048
spec:
  selector:
    app.kubernetes.io/name: app-2048
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-2048
  namespace: game-2048
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: service-2048
            port:
              number: 80
