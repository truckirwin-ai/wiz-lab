name: IaC Security Scan (Checkov)

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'k8s/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'k8s/**'

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-terraform.sarif
          soft_fail: true   # Don't block pipeline — findings are intentional

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          output_format: cli,sarif
          output_file_path: console,checkov-k8s.sarif
          soft_fail: true

      - name: Upload Terraform SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-terraform.sarif
          category: checkov-terraform

      - name: Upload Kubernetes SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-k8s.sarif
          category: checkov-kubernetes
